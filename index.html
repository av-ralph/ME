<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miss You More</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Variables for Easy Customization */
        :root {
            --primary: #ff4d6d;
            --primary-light: #ff758f;
            --primary-dark: #c9184a;
            --primary-glow: rgba(255, 77, 109, 0.4);
            --bg-start: #0f0c20;
            --bg-end: #1a1635;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #d1d1e0;
            --accent: #ffb3c1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--bg-end) 0%, var(--bg-start) 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Floating Hearts Background */
        .bg-heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 77, 109, 0.2);
            user-select: none;
            pointer-events: none;
            animation: floatUp 8s linear infinite;
            bottom: -50px;
            filter: blur(1px);
        }

        /* Glassmorphism Card with Neon Shadow */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4),
                        0 0 40px var(--primary-glow),
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center;
            border: 1px solid var(--card-border);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            animation: cardEntrance 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 77, 109, 0.1), transparent 30%);
            animation: rotate 10s linear infinite;
            pointer-events: none;
        }

        /* Upgraded 3D Heart Graphic */
        .heart-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 40px auto;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-wrapper:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .heart-main {
            position: relative;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%);
            transform: rotate(-45deg);
            box-shadow: -10px 10px 30px rgba(0, 0, 0, 0.3),
                        0 0 40px var(--primary-glow);
            animation: heartbeat 1.2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .heart-main::before,
        .heart-main::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: inherit;
            border-radius: 50%;
        }

        .heart-main::before {
            top: -40px;
            left: 0;
        }

        .heart-main::after {
            top: 0;
            right: -40px;
        }

        /* 3D Reflection */
        .heart-shine {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 40px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(4px);
            z-index: 3;
            transform: rotate(45deg);
        }

        /* Ambient Glow Pulse */
        .heart-wrapper::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.5;
            animation: pulseGlow 1.2s infinite;
        }

        /* Typography */
        h1 {
            color: var(--text-main);
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Typewriter Subtext Area */
        .typewriter-container {
            min-height: 60px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.6;
            margin: 0;
        }

        #typewriter-text {
            border-right: 2px solid var(--primary);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        /* Love Counter */
        .counter-container {
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #counter-value {
            color: var(--primary-light);
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Interactive Trigger Button */
        .btn-love {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
        }

        .btn-love::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-love:hover::before {
            left: 100%;
        }

        .btn-love:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.6);
        }

        .btn-love:active {
            transform: translateY(2px) scale(0.98);
        }

        /* Navigation Menu */
        .nav-menu {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: var(--primary-light);
        }

        .nav-item:hover {
            color: var(--text-main);
            transform: translateY(-2px);
        }

        /* Particle Explosion Elements */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            animation: explode 0.8s ease-out forwards;
        }

        /* Animations Framework */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            60% { transform: scale(1.4); opacity: 0.7; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1) rotate(-45deg); }
            30% { transform: scale(1.2) rotate(-45deg); }
            45% { transform: scale(1.1) rotate(-45deg); }
            60% { transform: scale(1.3) rotate(-45deg); }
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(60px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Main Dynamic Card Element -->
    <div class="card">
        <div class="heart-wrapper" id="mainHeart">
            <div class="heart-main">
                <div class="heart-shine"></div>
            </div>
        </div>
        <h1>I Miss You</h1>
        <div class="typewriter-container">
            <p id="typewriter-text"></p>
        </div>
        <div class="counter-container">
            Love Sent: <span id="counter-value">0</span>
        </div>
        <button class="btn-love" id="loveBtn">Send Love</button>
    </div>

    <nav class="nav-menu">
        <a href="index.html" class="nav-item active">
            <span>Home</span>
        </a>
        <a href="messages.html" class="nav-item">
            <span>Messages</span>
        </a>
    </nav>

    <!-- Script Handling Particle Explosions and Dynamic Ambient Effects -->
    <script>
        const typewriterText = document.getElementById('typewriter-text');
        const counterValue = document.getElementById('counter-value');
        const loveBtn = document.getElementById('loveBtn');
        const mainHeart = document.getElementById('mainHeart');

        const messages = [
            "Every second feels like an eternity...",
            "Thinking of you always...",
            "You are the best thing that ever happened to me.",
            "Distance means so little when someone means so much.",
            "I can't wait to see you again.",
            "Sending you a thousand virtual hugs!",
            "You're the melody in my heart."
        ];

        let messageIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let loveCount = parseInt(localStorage.getItem('loveCount')) || 0;

        // Initialize counter
        counterValue.innerText = loveCount.toLocaleString();

        function type() {
            const currentMessage = messages[messageIndex];
            
            if (isDeleting) {
                typewriterText.innerText = currentMessage.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterText.innerText = currentMessage.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentMessage.length) {
                typeSpeed = 2000; // Pause at the end
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                messageIndex = (messageIndex + 1) % messages.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        // Setup Ambient Floating Background Hearts
        function createBackgroundHearts() {
            const heartSymbols = ['❤️', '💖', '✨', '💕', '🌸', '🌹', '🦋'];
            const container = document.body;
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 7) + 's'; 
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.opacity = Math.random() * 0.5 + 0.2;
                
                container.appendChild(heart);
                
                setTimeout(() => { heart.remove(); }, 10000);
            }, 800);
        }

        function createParticles(x, y) {
            const particleCount = 25;
            const shapes = ['❤️', '💖', '✨', '💝', '🌸', '💕'];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.innerText = shapes[Math.floor(Math.random() * shapes.length)];
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.fontSize = `${Math.random() * 15 + 10}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 80;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;

                particle.style.setProperty('--x', `${destinationX}px`);
                particle.style.setProperty('--y', `${destinationY}px`);

                document.body.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 1000);
            }
        }

        // Setup Button Interactive Exploding Particle Effect
        loveBtn.addEventListener('click', (e) => {
            loveCount++;
            localStorage.setItem('loveCount', loveCount);
            counterValue.innerText = loveCount.toLocaleString();
            
            // Pulse the counter
            counterValue.style.transform = 'scale(1.5)';
            counterValue.style.transition = '0.2s';
            setTimeout(() => counterValue.style.transform = 'scale(1)', 200);

            const rect = loveBtn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createParticles(x, y);

            // Change button text briefly
            const originalText = loveBtn.innerText;
            loveBtn.innerText = "Love Sent! ❤️";
            setTimeout(() => { loveBtn.innerText = originalText; }, 1000);
        });

        // Heart click also sends love
        mainHeart.addEventListener('click', (e) => {
            const rect = mainHeart.getBoundingClientRect();
            createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            loveCount += 5; // Bonus love for clicking the heart!
            localStorage.setItem('loveCount', loveCount);
            counterValue.innerText = loveCount.toLocaleString();
        });

        // Initialize
        createBackgroundHearts();
        type();
    </script>
